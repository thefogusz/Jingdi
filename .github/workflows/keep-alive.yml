name: Keep Backend Alive

on:
  schedule:
    # รันทุกๆ 14 นาที (ประหยัดเวลา Action และป้องกัน Render หลับหลัง 15 นาที)
    - cron: '*/14 * * * *'
  workflow_dispatch: # อนุญาตให้กดรันเองได้ด้วย

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://jingdi.onrender.com/ > /dev/null
          echo "Pinged Backend at $(date)"
      - name: Ping Frontend
        run: |
          curl -s https://jingdi.online > /dev/null
          echo "Pinged Frontend at $(date)"
